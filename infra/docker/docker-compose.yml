name: naughtybox

# Naughtybox - phase 1 streaming stack
# Run from repo root: docker compose -f infra/docker/docker-compose.yml up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: naughtybox
      POSTGRES_PASSWORD: naughtybox
      POSTGRES_DB: naughtybox
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naughtybox"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mediamtx:
    image: bluenviron/mediamtx:1.17.0
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8888:8888"
      - "9997:9997"
      - "9998:9998"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: http://localhost:4200
      PUBLIC_API_BASE_URL: http://localhost:3000
      MEDIA_BASE_URL: http://localhost:4200/media
      MEDIA_INTERNAL_BASE_URL: http://mediamtx:8888
      RTMP_PUBLISH_URL: rtmp://localhost:1935/live
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: naughtybox
      DB_PASSWORD: naughtybox
      DB_NAME: naughtybox
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mediamtx:
        condition: service_started
    ports:
      - "${BACKEND_PUBLIC_PORT:-3000}:3000"
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: apps/frontend/Dockerfile
    depends_on:
      backend:
        condition: service_started
      mediamtx:
        condition: service_started
    ports:
      - "4200:80"
    restart: unless-stopped

volumes:
  postgres_data:
