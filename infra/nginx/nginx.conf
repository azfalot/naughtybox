# Naughtybox – Nginx config for frontend and reverse proxy
# Copy into container or mount at /etc/nginx/conf.d/default.conf

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

